<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Systems</title>
    <link rel="stylesheet" href="/assets/fonts/fonts.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(30, 36, 51, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --accent: #8b5cf6;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6rem 1.5rem 3rem 1.5rem;
            position: relative;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: floatIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 24px;
            background: var(--primary);
            border-radius: 4px;
        }

        #searchBox {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            color: #fff;
            outline: none;
            font-family: inherit;
            min-width: 250px;
            transition: border-color 0.2s;
        }

        #searchBox:focus {
            border-color: var(--primary);
        }

        .systems-wrapper {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .system-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', monospace;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .system-badge::before {
            content: '💻';
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-align: left;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        th:first-child {
            border-top-left-radius: 12px;
        }

        th:last-child {
            border-top-right-radius: 12px;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .roll-cell {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #fff;
            font-size: 1.05rem;
        }

        .ip-cell {
            font-family: 'Inter', monospace;
            color: #818cf8;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .sticker {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.6rem;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        .sticker-server {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.4);
        }

        .sticker-ta {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .nav-back {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .nav-back:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            #searchBox {
                width: 100%;
                min-width: auto;
            }

            .nav-back {
                top: 1rem;
                left: 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <a href="/" id="backBtn" class="nav-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="margin-right:0.5rem;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span id="backBtnText">Dashboard</span>
    </a>

    <div class="header" style="margin-top: 2rem;">
        <h1>Registered Systems</h1>
        <p class="subtitle">Roll numbers and their registered IP addresses</p>
    </div>

    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Linked Registrations <span id="regCount"
                    style="color: var(--text-muted); font-size: 0.9rem; font-weight: 400;"></span></h2>
            <input type="text" id="searchBox" placeholder="Search Roll or IP..." oninput="renderTable()">
        </div>

        <div
            style="background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th width="25%">Roll Number</th>
                        <th width="25%">IP Address</th>
                        <th width="30%">Authorized At</th>
                        <th width="20%">Status</th>
                    </tr>
                </thead>
                <tbody id="regTableBody">
                    <tr>
                        <td colspan="4" class="empty-state">Loading registration map...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let cachedData = null;

        async function fetchSystemData() {
            try {
                const response = await fetch('/api/system-access');
                if (!response.ok) throw new Error('Unauthorized');
                cachedData = await response.json();
                renderTable();
            } catch (error) {
                document.getElementById('regTableBody').innerHTML = '<tr><td colspan="4" class="empty-state" style="color: #f87171;">Server Error or Unauthorized.</td></tr>';
            }
        }

        function renderTable() {
            if (!cachedData) return;
            const tbody = document.getElementById('regTableBody');
            const search = document.getElementById('searchBox').value.toLowerCase();
            const registrations = cachedData.registrations || {};
            const rollNumbers = Object.keys(registrations).sort();

            let filteredRolls = rollNumbers.filter(roll => {
                const ip = typeof registrations[roll] === 'string' ? registrations[roll] : (registrations[roll].ip || '');
                return roll.toLowerCase().includes(search) || ip.toLowerCase().includes(search);
            });

            if (filteredRolls.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-state">${search ? 'No matches found.' : 'No registrations yet.'}</td></tr>`;
                document.getElementById('regCount').innerText = '(0)';
                return;
            }

            document.getElementById('regCount').innerText = `(${filteredRolls.length})`;
            tbody.innerHTML = filteredRolls.map(roll => {
                const regData = registrations[roll] || {};
                const ip = typeof regData === 'string' ? regData : (regData.ip || 'Unknown');
                const timestamp = typeof regData === 'string' ? 'Unknown' : (regData.timestamp || 'Unknown');

                let timeHtml = '<span style="opacity: 0.5;">-</span>';
                if (timestamp !== 'Unknown') {
                    try {
                        const d = new Date(timestamp.replace(' ', 'T'));
                        timeHtml = isNaN(d) ? timestamp : d.toLocaleString('en-IN', {
                            day: '2-digit', month: '2-digit', year: 'numeric',
                            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                        }).toUpperCase();
                    } catch (e) { timeHtml = timestamp; }
                }

                let stickerHtml = "";
                if (ip === cachedData.server_ip) stickerHtml = `<span class="sticker sticker-server">Server</span>`;
                else if (cachedData.ta_ips && cachedData.ta_ips[ip]) {
                    stickerHtml = `<span class="sticker sticker-ta">${cachedData.ta_ips[ip]}</span>`;
                }

                // Check Access Status
                const allowed = cachedData.allowed_systems || [];
                const taIpsList = Object.keys(cachedData.ta_ips || {});
                let isGranted = allowed.includes('224.*') && allowed.includes('225.*') ||
                    allowed.includes(ip) || ip === cachedData.server_ip ||
                    taIpsList.includes(ip) || ip.includes('127.0.0.1');

                if (!isGranted && ip.split('.').length === 4) {
                    const p = ip.split('.');
                    isGranted = allowed.includes(`${p[0]}.${p[1]}.${p[2]}.*`) ||
                        allowed.includes(`${p[1]}.*`) || allowed.includes(`${p[2]}.*`);
                }

                const statusHtml = isGranted
                    ? `<span style="color: #34d399; background: rgba(16, 185, 129, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; font-size: 0.8rem; border: 1px solid rgba(16, 185, 129, 0.2);">GRANTED</span>`
                    : `<span style="color: #f87171; background: rgba(239, 68, 68, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; font-size: 0.8rem; border: 1px solid rgba(239, 68, 68, 0.2);">REVOKED</span>`;

                return `<tr>
                    <td class="roll-cell">${roll}${stickerHtml}</td>
                    <td class="ip-cell">${ip}</td>
                    <td style="font-size: 0.85rem; opacity: 0.8;">${timeHtml}</td>
                    <td>${statusHtml}</td>
                </tr>`;
            }).join('');
        }

        fetchSystemData();
        setInterval(fetchSystemData, 10000);

        fetch('/api/is-admin').then(res => res.json()).then(data => {
            const b = document.getElementById('backBtn');
            const txt = document.getElementById('backBtnText');
            if (data.is_admin) {
                if (b) b.href = '/admin';
                if (txt) txt.innerText = 'Back to Admin Panel';
            }
        });
    </script>
</body>

</html>
