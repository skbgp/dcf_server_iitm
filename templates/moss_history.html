<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOSS Plagiarism Report History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --warning: #fbbf24;
            --accent: #38bdf8;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
            padding-top: 3rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.3);
        }

        .btn-warning {
            background-color: var(--warning);
            color: #000;
        }

        .btn-warning:hover {
            background-color: #f59e0b;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-1px);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.03);
            padding: 1.25rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.015);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }

        .timestamp {
            white-space: nowrap;
            color: var(--text-muted);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .status-empty {
            padding: 4rem;
            text-align: center;
            color: var(--text-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .nav-back {
            position: absolute; top: 1.5rem; left: 1.5rem;
            display: inline-flex; align-items: center; width: fit-content;
            text-decoration: none; font-weight: 500;
            padding: 0.5rem 1rem; border-radius: 8px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            z-index: 1000;
        }
        .nav-back:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateY(-1px); }
        @media (max-width: 640px) {
            .nav-back { top: 1rem; left: 1rem; padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <a href="/admin" id="backBtn" class="nav-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Back to Admin Panel</span>
    </a>
    <div class="container">
        <header>
            <h1>MOSS Report History</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Previous plagiarism checks for {{ course_name }}</p>
        </header>

        <div class="card">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date & Time (IST)</th>
                        <th>Lab Name</th>
                        <th>Question</th>
                        <th>Action</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="5" class="status-empty">
                            <div class="loading-spinner"></div> Loading history...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let _reports = [];

        async function loadHistory() {
            const body = document.getElementById('historyBody');
            try {
                const res = await fetch('/admin/moss-history');
                _reports = await res.json();
                
                if (_reports.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" class="status-empty">No plagiarism reports found for this course yet.</td></tr>';
                    return;
                }

                body.innerHTML = '';
                _reports.forEach((report, displayIdx) => {
                    // The server returns reports in reverse order (newest first).
                    // The CSV stores them chronologically, so the original index
                    // of this report in the CSV is (total - 1 - displayIdx).
                    const originalIndex = _reports.length - 1 - displayIdx;
                    const tr = document.createElement('tr');
                    tr.id = `moss-row-${originalIndex}`;
                    tr.innerHTML = `
                        <td class="timestamp">${report.timestamp}</td>
                        <td><span class="badge">${report.lab || '-'}</span></td>
                        <td style="font-weight: 600;">${report.question}</td>
                        <td>
                            <a href="/admin/moss-proxy?url=${report.url}" target="_blank" class="btn btn-warning" style="padding: 4px 12px; font-size: 0.8rem;">View Report</a>
                        </td>
                        <td>
                            <button onclick="deleteEntry(${originalIndex}, this)" class="btn btn-danger" style="padding: 4px 12px; font-size: 0.8rem;">Delete</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } catch (err) {
                body.innerHTML = '<tr><td colspan="5" class="status-empty" style="color: var(--danger);">Failed to load history items.</td></tr>';
            }
        }

        async function deleteEntry(index, btn) {
            if (!confirm('Delete this MOSS report entry? This cannot be undone.')) return;

            btn.disabled = true;
            btn.textContent = '...';
            try {
                const res = await fetch(`/admin/moss-history?index=${index}`, { method: 'DELETE' });
                if (res.ok) {
                    // Reload the whole table so indices stay correct
                    await loadHistory();
                } else {
                    alert('Failed to delete entry.');
                    btn.disabled = false;
                    btn.textContent = 'Delete';
                }
            } catch {
                alert('Network error.');
                btn.disabled = false;
                btn.textContent = 'Delete';
            }
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
